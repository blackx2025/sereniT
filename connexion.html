<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SereniT - Connexion</title>

<style>
body {
  margin:0;
  font-family: Georgia, serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #f8d7e5, #fdf7fa, #fce4f0);
  overflow-x:hidden;
  position:relative;
}

/* ANIMATION FORMULAIRE */
@keyframes fadeInUp {
  0% {opacity:0; transform: translateY(30px);}
  100% {opacity:1; transform: translateY(0);}
}

/* FORMULAIRE */
.form-container {
  background: rgba(255,255,255,0.95);
  padding:50px 35px;
  border-radius:25px;
  box-shadow:0 12px 35px rgba(0,0,0,0.12);
  display:flex;
  flex-direction:column;
  align-items:center;
  width:90%;
  max-width:400px;
  animation: fadeInUp 1s ease;
  z-index:2;
}

.form-container h2 {
  color:#5a3e5f;
  margin-bottom:30px;
  font-size:2rem;
}

/* INPUTS */
.form-container input {
  width:100%;
  padding:14px 16px;
  margin:12px 0;
  border-radius:15px;
  border:1px solid #e77fa3;
  font-size:16px;
  transition:0.3s;
}

.form-container input:focus {
  outline:none;
  border-color:#d46489;
  box-shadow:0 0 12px rgba(231,127,163,0.4);
}

/* PASSWORD */
.password-wrapper {
  position: relative;
}
.password-wrapper span {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 1.2rem;
  transition: transform 0.2s;
}
.password-wrapper span:hover{
  transform: translateY(-50%) scale(1.1);
}

/* BOUTON */
.form-container button {
  margin-top:20px;
  padding:14px 25px;
  border:none;
  border-radius:25px;
  background:#e77fa3;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition: all 0.3s ease;
}
.form-container button:hover {
  background:#d46489;
  transform: scale(1.05);
}

/* MESSAGE */
.message {
  margin-top:15px;
  font-size:14px;
  color:red;
  height:18px;
  text-align:center;
}

/* PARTICULES */
.particle {
  position:absolute;
  width:6px;
  height:6px;
  background: rgba(231,127,163,0.5);
  border-radius:50%;
  animation:riseParticle linear infinite;
  z-index:0;
}
@keyframes riseParticle {
  0% { transform: translateY(0) scale(1); opacity:0;}
  50% { opacity:0.7; }
  100% { transform: translateY(-800px) scale(0.5); opacity:0;}
}

/* FOOTER */
footer {
  margin-top:auto;
  font-size:1rem;
  color:#8e488e;
  padding:15px;
  text-align:center;
}

/* RESPONSIVE */
@media (max-width:768px){
  .form-container{ padding:40px 25px; width:95%; }
  .form-container input{ padding:12px; font-size:15px; }
  .password-wrapper span{ font-size:1.1rem; }
  .form-container button{ padding:12px 22px; font-size:15px; }
}

@media (max-width:480px){
  .form-container{ padding:30px 20px; width:95%; }
  .form-container input{ padding:10px; font-size:14px; }
  .password-wrapper span{ font-size:1rem; }
  .form-container button{ padding:10px 20px; font-size:14px; }
}
</style>
</head>

<body>

<div class="form-container">
  <h2>Connexion</h2>
  <form id="loginForm">
    <input type="text" id="username" placeholder="Nom d'utilisateur" required>

    <div class="password-wrapper">
      <input type="password" id="password" placeholder="Mot de passe" required>
      <span onclick="togglePassword('password')">👁️</span>
    </div>

    <button type="submit">Se connecter</button>
  </form>
  <div class="message" id="message"></div>
</div>

<footer>© 2026 SereniT - Tous droits réservés.</footer>

<script>
// PARTICULES FLUCTUANTES
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.bottom=Math.random()*100+"px";
  p.style.width=p.style.height=(Math.random()*6+3)+"px";
  p.style.animationDuration=(Math.random()*5+5)+"s";
  document.body.appendChild(p);
}

// AFFICHER / MASQUER MOT DE PASSE
function togglePassword(id){
  const f=document.getElementById(id);
  f.type = f.type==="password" ? "text" : "password";
}

// CONNEXION
document.getElementById("loginForm").addEventListener("submit",function(e){
  e.preventDefault();
  const username=document.getElementById("username").value.trim();
  const password=document.getElementById("password").value.trim();
  let accounts=JSON.parse(localStorage.getItem("accounts")) || [];
  const user=accounts.find(acc=>acc.username===username);
  const messageEl=document.getElementById("message");
  if(!user){
    messageEl.style.color="red";
    messageEl.textContent="Ce nom d'utilisateur n'existe pas.";
  } else if(user.password!==password){
    messageEl.style.color="red";
    messageEl.textContent="Mot de passe incorrect.";
  } else {
    messageEl.style.color="green";
    messageEl.textContent="Connexion réussie !";
    localStorage.setItem("currentUser",username);
    setTimeout(()=>{ window.location.href="siteee.html"; },1000);
  }
});
</script>

</body>
</html>
