<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Communautaire - SereniT</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #f8d7e5, #fdf7fa);
    color: #5a3e5f;
    text-align: center;
    overflow-x: hidden;
    padding-bottom:50px;
}

/* Container */
.container { 
    max-width: 1200px; 
    margin: 0 auto; 
    padding: 25px; 
}

/* Header */
header { padding: 50px 20px; }
h1 { font-size: 3rem; margin-bottom: 10px; color: #8e488e; animation: fadeInDown 1s ease; }
p { font-size: 1.2rem; animation: fadeIn 1s ease; }

/* Formulaire nouvelle discussion */
.new-discussion, .discussion {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    margin-bottom: 25px;
    text-align: left;
    transition: transform 0.3s, box-shadow 0.3s;
}
.new-discussion:hover, .discussion:hover{
    transform: translateY(-5px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.15);
}

.new-discussion input, .new-discussion textarea {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 12px;
    border: 1px solid #e77fa3;
    font-size: 1rem;
    color: #5a3e5f;
    transition: border-color 0.3s;
}
.new-discussion input:focus, .new-discussion textarea:focus{
    border-color:#d46489;
    outline:none;
}

/* Boutons */
.new-discussion button, .discussion button {
    margin-right: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 15px;
    background: #e77fa3;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}
.new-discussion button:hover, .discussion button:hover {
    background: #d46489;
    transform: scale(1.05);
}

/* Actions */
.actions { margin-top: 12px; }

/* Footer */
footer { 
    margin-top: 50px; 
    font-size: 1rem; 
    color:#8e488e; 
    padding: 20px;
}

/* Animations */
@keyframes fadeIn{
    0%{opacity:0;}
    100%{opacity:1;}
}
@keyframes fadeInDown{
    0%{opacity:0; transform:translateY(-15px);}
    100%{opacity:1; transform:translateY(0);}
}

/* Responsive */
@media(max-width:768px){
    h1{font-size:2.4rem;}
    .new-discussion, .discussion{padding: 20px;}
}
@media(max-width:480px){
    h1{font-size:2rem;}
    .new-discussion, .discussion{padding: 15px;}
    .new-discussion input, .new-discussion textarea{padding:10px;}
    .new-discussion button, .discussion button{padding:8px 12px;}
}
</style>
</head>

<body>

<div class="container">
    <header>
        <h1>Forum Communautaire SereniT</h1>
        <p>Partagez vos expériences et posez vos questions sur la gestion des émotions.</p>
    </header>

    <div class="new-discussion">
        <h3>Créer une nouvelle discussion</h3>
        <form id="forum-form">
            <input type="text" id="title" placeholder="Titre de la discussion" required />
            <textarea id="content" placeholder="Écrivez votre message ici..." rows="4" required></textarea>
            <button type="submit">Publier</button>
        </form>
    </div>

    <div class="forum" id="forum"></div>

    <footer>© 2026 SereniT - Tous droits réservés.</footer>
</div>

<script>
// Vérification utilisateur connecté
let currentUser = localStorage.getItem("currentUser");
if(!currentUser){
    alert("Vous devez être connecté pour accéder au forum !");
    window.location.replace("index.html");
}

// Récupération des discussions et favoris
let forumPosts = JSON.parse(localStorage.getItem("forumPosts")) || [];
let favoritePostsData = JSON.parse(localStorage.getItem("favoritePosts")) || {};

// Affichage du forum
function displayForum(){
    const forum = document.getElementById("forum");
    forum.innerHTML = "";
    forumPosts.forEach((post, index) => {
        const div = document.createElement("div");
        div.className = "discussion";
        div.innerHTML = `
            <h3>${post.title}</h3>
            <p>${post.content}</p>
            <div class="actions">
                <button onclick="likePost(${index})">👍 J'aime (${post.likes || 0})</button>
                <button onclick="dislikePost(${index})">👎 Je n'aime pas (${post.dislikes || 0})</button>
                <button onclick="favoritePost(${index})">${favoritePostsData[currentUser]?.includes(index) ? "⭐ En favoris" : "⭐ Mettre en favoris"}</button>
            </div>
        `;
        forum.appendChild(div);
    });
}

// Nouvelle discussion
document.getElementById("forum-form").addEventListener("submit", function(e){
    e.preventDefault();
    const title = document.getElementById("title").value.trim();
    const content = document.getElementById("content").value.trim();
    if(title && content){
        forumPosts.unshift({title, content, likes:0, dislikes:0});
        localStorage.setItem("forumPosts", JSON.stringify(forumPosts));
        document.getElementById("forum-form").reset();
        displayForum();
    }
});

// J'aime
function likePost(index){
    forumPosts[index].likes = (forumPosts[index].likes || 0) + 1;
    localStorage.setItem("forumPosts", JSON.stringify(forumPosts));
    displayForum();
}

// Je n'aime pas
function dislikePost(index){
    forumPosts[index].dislikes = (forumPosts[index].dislikes || 0) + 1;
    localStorage.setItem("forumPosts", JSON.stringify(forumPosts));
    displayForum();
}

// Favoris
function favoritePost(index){
    if(!favoritePostsData[currentUser]){
        favoritePostsData[currentUser] = [];
    }
    const favIndex = favoritePostsData[currentUser].indexOf(index);
    if(favIndex > -1){
        favoritePostsData[currentUser].splice(favIndex,1);
    } else {
        favoritePostsData[currentUser].push(index);
    }
    localStorage.setItem("favoritePosts", JSON.stringify(favoritePostsData));
    displayForum();
}

// Initialisation
displayForum();
</script>
</body>
</html>
