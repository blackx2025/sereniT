<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identification Sécurisée - SereniT</title>

<style>
/* Styles généraux */
body {
  margin:0;
  padding:0;
  font-family:'Georgia', serif;
  background: linear-gradient(to bottom, #f8d7e5, #fdf7fa);
  color:#5a3e5f;
  line-height:1.8;
  text-align:center;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

header {
  padding: 40px 20px;
}

h1 { font-size:3.5rem; margin-bottom:10px; color:#8e488e; }
p { font-size:1.3rem; }

.form-container {
  background-color: rgba(255,255,255,0.9);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  max-width: 500px;
  margin: 0 auto;
  transition: transform 0.3s ease;
}

.form-container:hover { transform: translateY(-10px); }

.form-container input, 
.form-container select {
  width:100%;
  padding:15px;
  margin:10px 0;
  border-radius:30px;
  border:1px solid #e77fa3;
  font-size:1rem;
  color:#5a3e5f;
}

.password-wrapper {
  position: relative;
}

.password-wrapper span {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size:1.1rem;
}

.form-container button {
  padding: 15px 40px;
  background:#e77fa3;
  color:#fff;
  border-radius:30px;
  border:none;
  font-size:1.2rem;
  cursor:pointer;
  transition: background 0.3s, transform 0.2s;
}
.form-container button:hover { background:#d46489; transform: scale(1.05); }

.anonymous-section { margin-top:20px; text-align:left; }
.pseudonym-section, .generated-pseudonyms { display:none; margin-top:15px; text-align:left; }

footer { margin-top:50px; font-size:1rem; color:#8e488e; }

/* Responsive Design */
@media (max-width:1024px){
  h1{ font-size:3rem; }
  p{ font-size:1.2rem; }
  .form-container{ padding:30px; max-width:90%; }
  .form-container button{ padding:12px 30px; font-size:1.1rem; }
}

@media (max-width:768px){
  h1{ font-size:2.5rem; }
  p{ font-size:1.1rem; }
  .form-container{ padding:25px; max-width:95%; }
  .form-container input, .form-container select{ padding:12px; font-size:0.95rem; }
  .form-container button{ padding:10px 25px; font-size:1rem; }
}

@media (max-width:480px){
  h1{ font-size:2rem; }
  p{ font-size:1rem; }
  .form-container{ padding:20px; border-radius:15px; }
  .form-container input, .form-container select{ padding:10px; font-size:0.9rem; }
  .form-container button{ padding:8px 20px; font-size:0.95rem; }
  .password-wrapper span{ font-size:1rem; }
}
</style>
</head>

<body>
<div class="container">
<header>
<h1>Identification Sécurisée</h1>
<p>Pour accéder à SereniT, merci de vous identifier. Vos informations restent sécurisées et anonymes.</p>
</header>

<div class="form-container">
<form id="identificationForm">
  <label>Nom (visible uniquement pour vous)</label>
  <input type="text" id="name" required placeholder="Entrez votre nom">

  <label>Classe</label>
  <select id="class" required>
    <option value="">Sélectionner une classe</option>
    <option value="7e">7ème</option>
    <option value="8e">8ème</option>
    <option value="9e">9ème</option>
    <option value="S1">S1</option>
    <option value="S2">S2</option>
    <option value="S3">S3</option>
    <option value="S4">S4</option>
  </select>

  <label>Mot de passe</label>
  <div class="password-wrapper">
    <input type="password" id="password" required placeholder="Créer un mot de passe">
    <span onclick="togglePassword('password')">👁️</span>
  </div>

  <label>Confirmer le mot de passe</label>
  <div class="password-wrapper">
    <input type="password" id="confirmPassword" required placeholder="Confirmer le mot de passe">
    <span onclick="togglePassword('confirmPassword')">👁️</span>
  </div>

  <div class="anonymous-section">
    <label>Souhaitez-vous rester anonyme ?</label><br>
    <input type="radio" name="anonymous" value="yes" onclick="togglePseudonymInput(true)">
    <label>Oui</label><br>
    <input type="radio" name="anonymous" value="no" onclick="togglePseudonymInput(false)">
    <label>Non</label>
  </div>

  <div class="pseudonym-section" id="pseudonym-section">
    <label>Pseudonyme (si vous souhaitez rester anonyme)</label>
    <input type="text" id="pseudonym" placeholder="Choisissez un pseudonyme">
  </div>

  <div class="generated-pseudonyms" id="generated-pseudonyms">
    <p>Choisissez un pseudonyme :</p>
    <select id="generatedPseudonym"></select>
  </div>

  <button type="submit">Créer mon compte</button>
</form>
</div>

<footer>© 2026 SereniT - Tous droits réservés.</footer>
</div>

<script>
// Afficher / masquer mot de passe
function togglePassword(id){
  const f=document.getElementById(id);
  f.type = f.type==="password" ? "text" : "password";
}

// Pseudonymes
function togglePseudonymInput(show){
  const pseudo=document.getElementById("pseudonym-section");
  const generated=document.getElementById("generated-pseudonyms");
  const name=document.getElementById("name").value;
  if(show){ pseudo.style.display="block"; generated.style.display="none"; }
  else{ pseudo.style.display="none"; generated.style.display="block"; generatePseudonyms(name); }
}

function generatePseudonyms(name){
  const select=document.getElementById("generatedPseudonym");
  select.innerHTML="";
  const pseudos=[name+"123","Super"+name,name+"_Star","Lady_"+name,"Mystery_"+name,name+"X"];
  pseudos.forEach(p=>{
    let opt=document.createElement("option");
    opt.value=p; opt.textContent=p;
    select.appendChild(opt);
  });
}

// Soumettre formulaire
document.getElementById("identificationForm").addEventListener("submit", function(e){
  e.preventDefault();
  const name=document.getElementById("name").value.trim();
  const classe=document.getElementById("class").value;
  const password=document.getElementById("password").value;
  const confirmPassword=document.getElementById("confirmPassword").value;
  const pseudonym=document.getElementById("pseudonym").value.trim();
  const generated=document.getElementById("generatedPseudonym").value;

  if(password!==confirmPassword){ alert("Les mots de passe ne correspondent pas !"); return; }
  const username=pseudonym || generated;
  if(!username){ alert("Veuillez choisir un pseudonyme"); return; }

  let accounts=JSON.parse(localStorage.getItem("accounts"))||[];
  if(accounts.some(u=>u.username===username)){ alert("Ce pseudonyme existe déjà"); return; }

  const user={ username, name, classe, password, bio:"", profilePic:"default-avatar.png", creationDate:Date.now() };
  accounts.push(user);
  localStorage.setItem("accounts", JSON.stringify(accounts));
  localStorage.setItem("currentUser", username);

  alert("Compte créé avec succès !");
  window.location.href="modifier.html";
});
</script>
</body>
</html>
