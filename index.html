
<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SereniT - Accueil</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #f8d7e5, #fdf7fa);
    display: flex;
    flex-direction: column;
}

body {
    flex: 1;
}

.container {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    position: relative;
    overflow: hidden;
    padding: 20px;
}

/* Background animé léger */
@keyframes pulse-bg {
    0% { background-position: 0 0; }
    50% { background-position: 100% 100%; }
    100% { background-position: 0 0; }
}

.container::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,182,193,0.3) 10%, transparent 40%), radial-gradient(circle, rgba(255,192,203,0.2) 10%, transparent 40%);
    background-size: 50% 50%;
    animation: pulse-bg 10s linear infinite;
    z-index: 0;
}

/* Logo */
header {
    padding: 40px 20px;
    position: relative;
    z-index: 1;
}

.logo-container {
    position: relative;
    display: inline-block;
    margin-bottom: 40px;
    border: 3px solid #e77fa3;
    border-radius: 50%;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(231, 127, 163, 0.3);
    animation: float 4s ease-in-out infinite;
}

.logo {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

/* Étoiles décoratives */
.star {
    position: absolute;
    font-size: 2rem;
    color: #f06292;
    animation: flutter 6s ease-in-out infinite;
}

.star-1 { top: -40px; left: -20px; animation-delay: 0.5s; }
.star-2 { top: 20px; right: -50px; animation-delay: 1s; }
.star-3 { bottom: -40px; left: 40px; animation-delay: 1.5s; }

@keyframes flutter {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(10deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

/* Bouton cœur SVG */
.heart-button {
    position: relative;
    width: 200px;
    height: 180px;
    cursor: pointer;
    z-index: 1;
    margin: 20px;
}

.heart-button svg {
    width: 100%;
    height: 100%;
    fill: #e77fa3;
    transition: transform 0.3s, fill 0.3s;
    animation: heartbeat 1.2s infinite;
}

.heart-button:hover svg {
    fill: #d46489;
    transform: scale(1.1);
}

.heart-button span {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-weight: bold;
    text-align: center;
    font-size: 1rem;
    width: 80%;
}

/* Animation cœur battant */
@keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.1); }
    50% { transform: scale(1); }
    75% { transform: scale(1.1); }
}

/* Pied de page */
footer {
    font-size: 1rem;
    color: #8e488e;
    position: relative;
    z-index: 1;
    margin-bottom: 20px;
}
</style>

<script src="scriptttttt.js"></script>

</head>

<body>

<div class="container">

<header>
    <div class="logo-container">
        <img src="SereniT.jpeg" alt="Logo SereniT" class="logo">
        <span class="star star-1">★</span>
        <span class="star star-2">★</span>
        <span class="star star-3">★</span>
    </div>
</header>

<!-- Bouton cœur avec SVG -->
<section>
    <div class="heart-button">
        <svg viewBox="0 0 32 29.6">
            <path d="M23.6,0c-2.9,0-5.4,1.7-6.6,4.1C15.8,1.7,13.3,0,10.4,0C4.7,0,0,4.7,0,10.4c0,7.4,11.8,13.2,16,19.2
                c4.2-6,16-11.8,16-19.2C32,4.7,27.3,0,23.6,0z"/>
        </svg>
        <span>🔐 Identification sécurisée</span>
    </div>
</section>

<footer>
    © 2025 SereniT - Tous droits réservés.
</footer>

</div>

</body>
</html>
