<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SereniT - Accueil</title>

<!-- CSS intégré -->
<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #f8d7e5, #fdf7fa);
    color: #5a3e5f;
    line-height: 1.8;
    text-align: center;
    overflow-x: hidden;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

header {
    padding: 40px 20px;
}

/* Logo avec cercle et animation */
.logo-container {
    position: relative;
    display: inline-block;
    margin-bottom: 40px;
    border: 3px solid #e77fa3;
    border-radius: 50%;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(231, 127, 163, 0.3);
    animation: float 4s ease-in-out infinite;
}

.logo {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
}

@keyframes float {
    0% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0); }
}

/* Étoiles décoratives */
.star {
    position: absolute;
    font-size: 2rem;
    color: #f06292;
    animation: flutter 6s ease-in-out infinite;
}

.star-1 { top: -40px; left: -20px; animation-delay: 0.5s; }
.star-2 { top: 20px; right: -50px; animation-delay: 1s; }
.star-3 { bottom: -40px; left: 40px; animation-delay: 1.5s; }

@keyframes flutter {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(10deg); }
    100% { transform: translateY(0) rotate(0deg); }
}

/* Boutons */
.btn {
    display: inline-block;
    padding: 15px 40px;
    margin: 20px 10px;
    text-decoration: none;
    color: #fff;
    background: #e77fa3;
    border-radius: 30px;
    font-size: 1.2rem;
    transition: background 0.3s, transform 0.2s;
}

.btn:hover {
    background: #d46489;
    transform: scale(1.05);
}

/* Pied de page */
footer {
    margin-top: 50px;
    font-size: 1rem;
    color: #8e488e;
}
</style>

<!-- Lien vers ton JavaScript -->
<script src="scriptttttt.js"></script>

</head>

<body>

<div class="container">

<header>
    <div class="logo-container">
        <img src="SereniT.jpeg" alt="Logo SereniT" class="logo">
        <!-- Étoiles -->
        <span class="star star-1">★</span>
        <span class="star star-2">★</span>
        <span class="star star-3">★</span>
    </div>
</header>

<!-- Bouton unique pour l’identification sécurisée -->
<section>
    <a href="identification.html" class="btn">🔐 Identification sécurisée</a>
</section>

<!-- Pied de page -->
<footer>
    © 2025 SereniT - Tous droits réservés.
</footer>

</div>

</body>
</html>
