<!DOCTYPE html>
<html lang="fr">

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Messagerie Anonyme - SereniT</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background: #f8f9fa;
            color: #5a3e5f;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Conteneur principal */
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Barre de recherche en haut */
        .search-bar {
            background-color: #ffffff;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-bar input {
            width: 80%;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        .search-bar button {
            padding: 10px 15px;
            background-color: #e77fa3;
            border: none;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }

        .search-bar button:hover {
            background-color: #d46489;
        }

        /* Boîte de messages - occupe la majorité de l'écran */
        .message-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            padding-right: 50px;
        }

        .message {
            background-color: #e9c9d1;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 15px;
            font-size: 1rem;
            color: #5a3e5f;
            text-align: left;
        }

        .message .sender {
            font-weight: bold;
        }

        /* Zone d'envoi du message */
        .message-form {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 10px;
            background-color: #ffffff;
            border-top: 1px solid #ddd;
        }

        .message-form textarea {
            width: 80%;
            padding: 10px;
            border-radius: 25px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
            resize: none;
        }

        .message-form button {
            padding: 12px 20px;
            background-color: #e77fa3;
            color: white;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            margin-left: 10px;
        }

        .message-form button:hover {
            background-color: #d46489;
        }

        footer {
            padding: 20px;
            font-size: 1rem;
            color: #8e488e;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Barre de recherche -->
        <div class="search-bar">
            <input type="text" placeholder="Rechercher des messages..." id="search-input" oninput="searchMessages()" />
            <button onclick="clearSearch()">Réinitialiser</button>
        </div>

        <!-- Boîte de messages -->
        <div class="message-box" id="message-box">
            <!-- Exemple de message -->
            <div class="message">
                <p class="sender">Utilisateur 1 :</p>
                <p>Comment puis-je mieux gérer mon stress pendant les examens ?</p>
            </div>
            <div class="message">
                <p class="sender">Réponse (Psychologue) :</p>
                <p>Il existe plusieurs techniques de relaxation que vous pouvez essayer, comme la respiration profonde ou les pauses régulières pendant vos révisions.</p>
            </div>
        </div>

        <!-- Formulaire pour envoyer un message -->
        <div class="message-form">
            <textarea id="message" rows="2" placeholder="Écrivez votre message ici..."></textarea>
            <button onclick="sendMessage()">Envoyer</button>
        </div>

        <!-- Pied de page -->
        <footer>
            © 2025 SereniT - Tous droits réservés.
        </footer>

    </div>

    <script>
        // Fonction d'envoi de message
        function sendMessage() {
            const messageBox = document.getElementById('message-box');
            const messageText = document.getElementById('message').value;
            const sender = "Utilisateur Anonyme"; // Par défaut, on met "Anonyme"

            if (messageText.trim() !== "") {
                // Créer un nouveau message à afficher
                const newMessage = document.createElement('div');
                newMessage.classList.add('message');
                newMessage.innerHTML = `<p class="sender">${sender} :</p><p>${messageText}</p>`;

                // Ajouter le message à la boîte de messages
                messageBox.appendChild(newMessage);

                // Faire défiler la boîte vers le bas après ajout du message
                messageBox.scrollTop = messageBox.scrollHeight;

                // Réinitialiser le champ de saisie
                document.getElementById('message').value = '';
            }
        }

        // Fonction de recherche des messages
        function searchMessages() {
            const searchInput = document.getElementById('search-input').value.toLowerCase();
            const messages = document.querySelectorAll('.message');
            messages.forEach(function (message) {
                const messageText = message.textContent.toLowerCase();
                if (messageText.includes(searchInput)) {
                    message.style.display = 'block';
                } else {
                    message.style.display = 'none';
                }
            });
        }

        // Fonction pour réinitialiser la recherche et afficher tous les messages
        function clearSearch() {
            document.getElementById('search-input').value = '';
            searchMessages();
        }
    </script>

</body>

</html>
