<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SereniT - Profil</title>
<style>
body {
  margin:0;
  font-family: Georgia, serif;
  min-height:100vh;
  background: linear-gradient(135deg,#f8d7e5,#fdf7fa);
  display:flex;
  flex-direction:column;
  align-items:center;
}
.profile-wrapper {
  margin-top:40px;
  background: rgba(255,255,255,0.9);
  border-radius:20px;
  padding:20px;
  width:90%;
  max-width:500px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.profile-header {
  display:flex;
  align-items:center;
  width:100%;
  margin-bottom:15px;
}
.profile-pic {
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #e77fa3;
  object-fit:cover;
  margin-right:20px;
}
.username-section {
  display:flex;
  flex-direction:column;
}
.username-display {
  font-size:22px;
  font-weight:bold;
  color:#5a3e5f;
  margin-bottom:10px;
}
#editProfileBtn {
  padding:8px 15px;
  border-radius:15px;
  border:none;
  background:#e77fa3;
  color:white;
  cursor:pointer;
  font-size:0.9rem;
}
#editProfileBtn:hover {background:#d46489;}
.bio {
  width:100%;
  text-align:left;
  font-size:16px;
  color:#5a3e5f;
  min-height:50px;
  border-top:1px solid #e77fa3;
  padding-top:10px;
}
footer {margin-top:auto;font-size:1rem;color:#8e488e;padding:15px;text-align:center;}
</style>
</head>
<body>

<div class="profile-wrapper">
  <div class="profile-header">
    <img src="default-avatar.png" class="profile-pic" id="profilePic">
    <div class="username-section">
      <div class="username-display" id="usernameDisplay">Utilisateur</div>
      <button id="editProfileBtn">Modifier profil</button>
    </div>
  </div>
  <div class="bio" id="bioDisplay"></div>
</div>

<footer>© 2026 SereniT - Tous droits réservés.</footer>

<script>
let currentUser = localStorage.getItem("currentUser");
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];
let user = accounts.find(u=>u.username===currentUser);

const profilePic=document.getElementById("profilePic");
const usernameDisplay=document.getElementById("usernameDisplay");
const bioDisplay=document.getElementById("bioDisplay");

if(user){
  profilePic.src = user.profilePic || "default-avatar.png";
  usernameDisplay.textContent = user.username;
  bioDisplay.textContent = user.bio || "";
}

document.getElementById("editProfileBtn").onclick = ()=>{
  window.location.href = "modifier-profil.html";
}
</script>

</body>
</html>
