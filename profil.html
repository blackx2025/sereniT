<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SereniT - Profil</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Lora&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Lora', serif;
  min-height:100vh;
  background:linear-gradient(135deg,#f8d7e5,#fdf7fa);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-bottom:50px;
}

/* CARTE PROFIL */
.profile-wrapper{
  margin-top:50px;
  background:rgba(255,255,255,0.9);
  border-radius:25px;
  padding:35px 30px;
  width:90%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  animation: fadeIn 1.2s ease forwards;
}

/* Header */
.profile-header{
  display:flex;
  align-items:center;
  width:100%;
  justify-content:space-between;
  margin-bottom:25px;
}

.profile-left{
  display:flex;
  align-items:center;
}

/* Photo Profil */
.profile-pic{
  width:130px;
  height:130px;
  border-radius:50%;
  border:3px solid #e77fa3;
  object-fit:cover;
  margin-right:25px;
  transition: transform 0.3s, box-shadow 0.3s;
}
.profile-pic:hover{
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(231,127,163,0.5);
}

/* Nom et bouton modifier */
.username-section{
  display:flex;
  flex-direction:column;
}

.username-display{
  font-size:24px;
  font-weight:bold;
  color:#5a3e5f;
  margin-bottom:8px;
}

#editProfileBtn{
  padding:10px 18px;
  border-radius:18px;
  border:none;
  background:#e77fa3;
  color:white;
  cursor:pointer;
  font-size:1rem;
  transition: all 0.3s;
}
#editProfileBtn:hover{
  background:#d46489;
  transform: scale(1.05);
}

/* SETTINGS ICON */
.settings-icon{
  width:32px;
  height:32px;
  cursor:pointer;
  transition: transform 0.2s;
}
.settings-icon:hover{
  transform: rotate(15deg);
}

.settings-menu{
  display:none;
  position:absolute;
  top:90px;
  right:50px;
  background:#fff;
  border:1px solid #e77fa3;
  border-radius:15px;
  padding:12px 18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  z-index:100;
}

.settings-menu button{
  background:none;
  border:none;
  color:#5a3e5f;
  font-size:1rem;
  cursor:pointer;
  padding:6px 0;
  transition: color 0.2s;
}
.settings-menu button:hover{
  color:#d46489;
}

/* BIO */
.bio{
  width:100%;
  text-align:left;
  font-size:16px;
  color:#5a3e5f;
  min-height:60px;
  border-top:1px solid #e77fa3;
  padding-top:15px;
  margin-bottom:25px;
  line-height:1.7;
}

/* SECTION ACTIVITE */
.activity-section{
  width:100%;
}

.activity-section h3{
  color:#8e488e;
  margin-bottom:20px;
}

.activity-box{
  background:#fff;
  border-radius:15px;
  padding:15px 18px;
  margin-bottom:15px;
  border:1px solid #e77fa3;
  transition: transform 0.3s, box-shadow 0.3s;
}
.activity-box:hover{
  transform: translateY(-4px);
  box-shadow:0 8px 20px rgba(231,127,163,0.3);
}

.activity-box h4{
  margin:0 0 10px 0;
  font-size:16px;
  color:#5a3e5f;
}

.activity-box p{
  margin:4px 0;
  font-size:14px;
  color:#5a3e5f;
}

/* FOOTER */
footer{
  margin-top:auto;
  font-size:1rem;
  color:#8e488e;
  padding:20px;
  text-align:center;
}

/* RESPONSIVE */
@media (max-width:768px){
  .profile-wrapper{padding:25px 20px;width:95%;}
  .profile-pic{width:110px;height:110px;}
  .username-display{font-size:22px;}
  #editProfileBtn{font-size:0.9rem;}
  .settings-menu{right:20px;top:75px;}
}

@media (max-width:480px){
  .profile-wrapper{padding:18px;}
  .profile-pic{width:85px;height:85px;}
  .username-display{font-size:18px;}
  #editProfileBtn{font-size:0.8rem;}
  .settings-menu{right:15px;top:65px;}
}

/* Animations */
@keyframes fadeIn{
  0%{opacity:0; transform:translateY(15px);}
  100%{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="profile-wrapper">

  <div class="profile-header">
    <div class="profile-left">
      <img src="default-avatar.png" class="profile-pic" id="profilePic">
      <div class="username-section">
        <div class="username-display" id="usernameDisplay">Utilisateur</div>
        <button id="editProfileBtn">Modifier profil</button>
      </div>
    </div>

    <img src="settings-icon.png" class="settings-icon" id="settingsIcon" title="Paramètres">

    <div class="settings-menu" id="settingsMenu">
      <button id="logoutBtn">Déconnexion</button>
    </div>
  </div>

  <div class="bio" id="bioDisplay"></div>

  <div class="activity-section">
    <h3>Mon activité</h3>

    <div class="activity-box">
      <h4>📅 Rendez-vous</h4>
      <div id="futureAppointments"></div>
      <div id="pastAppointments"></div>
    </div>

    <div class="activity-box">
      <h4>🧠 Résultats des quiz sur le stress</h4>
      <div id="quizResults"></div>
    </div>

    <div class="activity-box">
      <h4>📚 Articles sur le stress lus</h4>
      <div id="readArticles"></div>
    </div>

    <div class="activity-box">
      <h4>⭐ Articles favoris</h4>
      <div id="favoriteArticles"></div>
    </div>

    <div class="activity-box">
      <h4>💬 Messages du forum enregistrés</h4>
      <div id="favoritePosts"></div>
    </div>

  </div>

</div>

<footer>© 2026 SereniT - Tous droits réservés.</footer>

<script>
let currentUser = localStorage.getItem("currentUser");
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];
let user = accounts.find(u=>u.username===currentUser);

const profilePic=document.getElementById("profilePic");
const usernameDisplay=document.getElementById("usernameDisplay");
const bioDisplay=document.getElementById("bioDisplay");

if(user){
  profilePic.src=user.profilePic || "default-avatar.png";
  usernameDisplay.textContent=user.username;
  bioDisplay.textContent=user.bio || "";
}

document.getElementById("editProfileBtn").onclick=()=>{
  window.location.href="modifier.html";
}

const settingsIcon = document.getElementById("settingsIcon");
const settingsMenu = document.getElementById("settingsMenu");
settingsIcon.onclick = ()=>{
  settingsMenu.style.display = settingsMenu.style.display==="block" ? "none" : "block";
}

document.getElementById("logoutBtn").onclick = ()=>{
  localStorage.removeItem("currentUser");
  window.location.replace("index.html");
}

const pastAppointments = JSON.parse(localStorage.getItem("pastAppointments")) || [];
const futureAppointments = JSON.parse(localStorage.getItem("futureAppointments")) || [];
const quizResults = JSON.parse(localStorage.getItem("quizResults")) || [];
const readArticles = JSON.parse(localStorage.getItem("readArticles")) || [];
const favoriteArticles = JSON.parse(localStorage.getItem("favoriteArticles")) || [];
const favoritePosts = JSON.parse(localStorage.getItem("favoritePosts")) || [];

function displayList(list,id){
  const container=document.getElementById(id);
  container.innerHTML="";
  if(list.length===0){
    container.innerHTML="<p>Aucun élément pour le moment.</p>";
    return;
  }
  list.forEach(item=>{
    let p=document.createElement("p");
    p.textContent=item;
    container.appendChild(p);
  });
}

displayList(futureAppointments,"futureAppointments");
displayList(pastAppointments,"pastAppointments");
displayList(quizResults,"quizResults");
displayList(readArticles,"readArticles");
displayList(favoriteArticles,"favoriteArticles");
displayList(favoritePosts,"favoritePosts");
</script>

</body>
</html>
