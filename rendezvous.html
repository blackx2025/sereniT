<body>
    <div class="container">
        <header>
            <h1>🌸 Prendre Rendez-vous - SereniT 🌸</h1>
            <p>Choisis la date et l’heure qui te conviennent pour parler à un(e) psychologue.</p>
        </header>

        <div class="form-container">
            <form id="rendezvousForm">
                <!-- Nom (prérempli avec localStorage) -->
                <label for="name">Nom :</label>
                <input type="text" id="name" name="name" readonly />

                <!-- Pseudonyme (prérempli avec localStorage) -->
                <label for="pseudonym">Pseudonyme :</label>
                <input type="text" id="pseudonym" name="pseudonym" readonly />

                <!-- Date -->
                <label for="date">Choisis une date :</label>
                <input type="date" id="date" name="date" required min="<?php echo date('Y-m-d'); ?>">

                <!-- Créneau horaire -->
                <label for="time">Sélectionne un créneau :</label>
                <select id="time" name="time" required>
                    <option value="">Choisir un créneau</option>
                    <option value="09:00">09:00 - 10:00</option>
                    <option value="10:00">10:00 - 11:00</option>
                    <option value="11:00">11:00 - 12:00</option>
                    <option value="14:00">14:00 - 15:00</option>
                    <option value="15:00">15:00 - 16:00</option>
                    <option value="16:00">16:00 - 17:00</option>
                </select>

                <button type="submit">📅 Valider le rendez-vous</button>
            </form>
        </div>

        <footer>
            © 2025 SereniT - Avec amour et bienveillance 🦋
        </footer>
    </div>

    <script>
        

        // Gestion du formulaire
        document.getElementById('rendezvousForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;

            if (!date || !time) {
                alert("Veuillez choisir une date et un créneau.");
                return;
            }

            // Stocker rendez-vous dans localStorage (peut être remplacé par un serveur)
            localStorage.setItem('rendezvous', JSON.stringify({ date, time }));

            alert(`Rendez-vous confirmé pour le ${date} à ${time} 🌸`);
            this.reset();

            // Optionnel : redirection vers le forum ou page d'accueil
            // window.location.href = 'forum.html';
        });
    </script>
