<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Évaluateur de stress - SereniT</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(to bottom, #f8d7e5, #fdf7fa);
      color: #5a3e5f;
      padding: 30px;
      max-width: 900px;
      margin: auto;
    }

    h1 {
      color: #8e488e;
      text-align: center;
    }

    form {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    .question {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .options {
      margin-left: 20px;
    }

    textarea, input[type="text"] {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      margin-top: 20px;
      background: #8e488e;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #resultat {
      margin-top: 30px;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Évaluateur de stress</h1>
  <div id="content"></div>

  <script>
    const content = document.getElementById("content");
    let alreadySubmitted = false;

    function createForm() {
      const form = document.createElement("form");
      form.id = "stressForm";

      for (let i = 1; i <= 10; i++) {
        const questionDiv = document.createElement("div");
        questionDiv.className = "question";
        questionDiv.innerHTML = `
          <label>Question ${i} : Comment te sens-tu dans cette situation ?</label>
          <div class="options">
            <label><input type="radio" name="q${i}" value="1" required> Jamais</label><br>
            <label><input type="radio" name="q${i}" value="2"> Parfois</label><br>
            <label><input type="radio" name="q${i}" value="3"> Souvent</label><br>
            <label><input type="radio" name="q${i}" value="4"> Très souvent</label><br>
          </div>
          <div>
            <label>Souhaites-tu répondre avec tes propres mots ? (facultatif)</label>
            <textarea name="text${i}" rows="2" placeholder="Exprime-toi ici si tu le souhaites..."></textarea>
          </div>
        `;
        form.appendChild(questionDiv);
      }

      const journeeDiv = document.createElement("div");
      journeeDiv.innerHTML = `
        <label>Souhaites-tu raconter ta journée ?</label>
        <button type="button" onclick="montrerJournal(true)">Oui</button>
        <button type="button" onclick="montrerJournal(false)">Non</button>
        <div id="zoneJournal" class="hidden">
          <textarea name="journal" rows="4" placeholder="Raconte ta journée ici..."></textarea>
        </div>
      `;
      form.appendChild(journeeDiv);

      const submitBtn = document.createElement("button");
      submitBtn.type = "submit";
      submitBtn.textContent = "Évaluer mon stress";
      form.appendChild(submitBtn);

      content.innerHTML = "";
      content.appendChild(form);

      form.addEventListener("submit", function(e) {
        e.preventDefault();

        if (alreadySubmitted) {
          const confirmRepeat = confirm("Tu as déjà rempli cet évaluateur. Veux-tu vraiment le refaire ?");
          if (!confirmRepeat) return;
        }

        alreadySubmitted = true;

        let score = 0;
        for (let i = 1; i <= 10; i++) {
          const val = form.querySelector(`input[name="q${i}"]:checked`);
          if (val) score += parseInt(val.value);
        }

        let message = "";
        if (score <= 15) {
          message = "Ton niveau de stress semble faible. Garde cet équilibre 🌿.";
        } else if (score <= 25) {
          message = "Ton stress est modéré. Essaie de prendre un peu plus soin de toi 💡.";
        } else {
          message = "Ton niveau de stress est élevé. Tu pourrais bénéficier d’un accompagnement 💬.";
        }

        afficherChoixPostEvaluation(message);
      });
    }

    function montrerJournal(oui) {
      document.getElementById("zoneJournal").classList.toggle("hidden", !oui);
    }

    function afficherChoixPostEvaluation(message) {
      content.innerHTML = `
        <div id="resultat">${message}</div>
        <p>Souhaites-tu prendre rendez-vous avec un psychologue ?</p>
        <button onclick="redirigerPsychologue(true)">Oui</button>
        <button onclick="redirigerPsychologue(false)">Non</button>
      `;
    }

    function redirigerPsychologue(choix) {
      if (choix) {
        window.location.href = "prendre-rendezvous.html";
      } else {
        const conseils = [
          "🌿 Respire profondément 3 fois.",
          "📝 Écris ce que tu ressens dans un carnet.",
          "🎵 Écoute une musique qui te fait du bien.",
          "🚶‍♂️ Bouge un peu, ça aide à libérer le stress.",
          "💧 Bois de l’eau et repose-toi un instant."
        ];
        alert("Quelques conseils pour toi :\\n\\n" + conseils.join("\\n"));
        demanderAccesForum();
      }
    }

    function demanderAccesForum() {
      const forumDiv = document.createElement("div");
      forumDiv.innerHTML = `
        <p>Souhaites-tu accéder au forum ?</p>
        <button onclick="redirigerForum(true)">Oui</button>
        <button onclick="redirigerForum(false)">Non</button>
      `;
      content.appendChild(forumDiv);
    }

    function redirigerForum(choix) {
      if (choix) {
        window.location.href = "forum.html";
      } else {
        content.innerHTML = "";
        createForm();
      }
    }

    // Initialisation
    createForm();
  </script>
</body>
</html>
